<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questioning Everything Always</title>
    <meta
      name="description"
      content="A single-screen interactive landing page where a car-shaped cursor reveals the hidden message through a moving headlight."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" id="stage">
      <div class="overlay" id="overlay"></div>
      <div class="message" id="message">Questioning Everything Always</div>
      <div class="light-beam" id="lightBeam"></div>
      <div class="car-cursor" id="carCursor" aria-hidden="true">
        <div class="car-body"></div>
        <div class="car-headlight"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
