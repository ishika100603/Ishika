<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crafted to be Felt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    canvas {
      display: block;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 3px;
      z-index: 100;
      transition: opacity 1.2s;
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #222;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 3px;
      pointer-events: none;
      transition: opacity 3s;
    }

    .site-nav {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(10, 10, 10, 0.72);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
    }

    .site-nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    .site-nav a:hover {
      color: #8ec5ff;
    }
  </style>
</head>

<body>
  <div id="loading">LOADING...</div>
  <div id="hint">MOUSE · ARROW KEYS · WASD</div>
  <nav class="site-nav" aria-label="Project navigation">
    <a href="three-scene1.html">3D Scene 1</a>
    <a href="three-scene2.html">3D Scene 2</a>
    <a href="p5-sketch1.html">2D Sketch 1</a>
    <a href="p5-sketch2.html">2D Sketch 2</a>
    <a href="d3-scene.html">D3 Timeline</a>
  </nav>
  <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    // ── HELPERS (these were missing — p5.js functions don't exist here) ──
    function random(a, b) {
      if (a === undefined) return Math.random();
      if (b === undefined) return Math.random() * a;
      return a + Math.random() * (b - a);
    }
    function floor(v) { return Math.floor(v); }
    function max(...vals) { return Math.max(...vals); }

    // ── SCENE ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.025);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 6, 18);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.0));

    // ── GROUND ─────────────────────────────────────────────────────────
    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 600),
      new THREE.MeshStandardMaterial({ color: 0x0c0c0c, roughness: 1 })
    );
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    const roadsideObjects = [];
    let debugRoadsideTimer = 4.0;

    const dashMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 });
    for (let i = -30; i < 30; i++) {
      const d = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 6), dashMat);
      d.rotation.x = -Math.PI / 2;
      d.position.set(0, 0.01, i * 10);
      scene.add(d);
    }

    populateRoadsideArt();

    // ── CAR ────────────────────────────────────────────────────────────
    const car = new THREE.Group();
    scene.add(car);

    const carMat = new THREE.MeshStandardMaterial({ color: 0x08081a, roughness: 0.25, metalness: 0.85 });
    const trimMat = new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 0.15, metalness: 0.7 });
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, transparent: true, opacity: 0.28, roughness: 0.05 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.6, 4.8), carMat);
    body.position.y = 0.62;
    body.castShadow = true;
    car.add(body);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.95, 0.58, 2.5), trimMat);
    cabin.position.set(0, 1.22, -0.25);
    cabin.castShadow = true;
    car.add(cabin);

    const windF = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.52, 0.05), glassMat);
    windF.position.set(0, 1.2, 1.02);
    car.add(windF);

    const windR = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.48, 0.05), glassMat);
    windR.position.set(0, 1.2, -1.52);
    car.add(windR);

    const hood = new THREE.Mesh(new THREE.BoxGeometry(2.25, 0.06, 1.1), carMat);
    hood.position.set(0, 0.94, 1.85);
    hood.rotation.x = 0.15;
    car.add(hood);

    const bumperF = new THREE.Mesh(new THREE.BoxGeometry(2.38, 0.28, 0.16), trimMat);
    bumperF.position.set(0, 0.36, 2.46);
    car.add(bumperF);

    const bumperR = new THREE.Mesh(new THREE.BoxGeometry(2.38, 0.28, 0.16), trimMat);
    bumperR.position.set(0, 0.36, -2.46);
    car.add(bumperR);

    [-1.17, 1.17].forEach(x => {
      const skirt = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.18, 4.4), trimMat);
      skirt.position.set(x, 0.38, 0);
      car.add(skirt);
    });

    // Wheels
    const wGeo = new THREE.CylinderGeometry(0.44, 0.44, 0.26, 20);
    const wMat = new THREE.MeshStandardMaterial({ color: 0x060606, roughness: 0.95 });
    const rGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.28, 8);
    const rMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.95, roughness: 0.05 });

    const wheelPositions = [[-1.22, 0.44, 1.5], [1.22, 0.44, 1.5], [-1.22, 0.44, -1.5], [1.22, 0.44, -1.5]];
    const wheels = [];
    wheelPositions.forEach(([x, y, z]) => {
      const w = new THREE.Mesh(wGeo, wMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(x, y, z);
      w.castShadow = true;
      car.add(w);
      wheels.push(w);
      const rim = new THREE.Mesh(rGeo, rMat);
      rim.rotation.z = Math.PI / 2;
      rim.position.set(x, y, z);
      car.add(rim);
    });

    // Headlights
    const hlHouseMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
    const hlLensMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 6 });
    [-0.75, 0.75].forEach(x => {
      const housing = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, 0.12), hlHouseMat);
      housing.position.set(x, 0.76, 2.46);
      car.add(housing);
      const lens = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.14, 0.07), hlLensMat);
      lens.position.set(x, 0.76, 2.5);
      car.add(lens);
    });

    // Tail lights
    const tlMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xbb0000, emissiveIntensity: 2.5 });
    [-0.75, 0.75].forEach(x => {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.14, 0.07), tlMat);
      tl.position.set(x, 0.76, -2.5);
      car.add(tl);
    });

    // ── SPOTLIGHTS ─────────────────────────────────────────────────────
    const makeSpot = () => {
      const s = new THREE.SpotLight(0xfff8e0, 150, 60, Math.PI / 10, 0.15, 1.1);
      s.castShadow = true;
      s.shadow.mapSize.set(1024, 1024);
      return s;
    };
    const spotL = makeSpot(), spotR = makeSpot();
    scene.add(spotL, spotR);
    const tgtL = new THREE.Object3D(), tgtR = new THREE.Object3D();
    scene.add(tgtL, tgtR);
    spotL.target = tgtL;
    spotR.target = tgtR;

    // ── TEXT ───────────────────────────────────────────────────────────
    const fontLoader = new FontLoader();
    fontLoader.load(
      'https://unpkg.com/three@0.158.0/examples/fonts/helvetiker_bold.typeface.json',
      font => {
        const geo = new TextGeometry('CRAFTED TO BE FELT', {
          font,
          size: 1.6,
          height: 0.35,
          curveSegments: 6,
          bevelEnabled: true,
          bevelThickness: 0.04,
          bevelSize: 0.025,
          bevelSegments: 2,
        });
        geo.computeBoundingBox();
        const textWidth = geo.boundingBox.max.x - geo.boundingBox.min.x;

        const textMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 0.95,
          metalness: 0.0,
          emissive: 0x000000,
        }));

        textMesh.position.set(-textWidth / 2, 1.1, -18);
        textMesh.receiveShadow = true;
        scene.add(textMesh);

        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loading').remove();
          setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);
        }, 1200);
      }
    );

    // ── CAR PHYSICS ────────────────────────────────────────────────────
    let carX = 0, carZ = 8;
    let velocity = 0;
    let steerAngle = 0;
    let carFacing = Math.PI;

    const ACCEL = 12;
    const FRICTION = 0.88;
    const STEER_SPEED = 2.2;
    const MAX_SPEED = 14;

    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);
    const mouseWorld = new THREE.Vector3();
    let mouseActive = false;

    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      mouseActive = true;
    });

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── ANIMATE ────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const camLookAt = new THREE.Vector3(0, 1, 0);

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      const usingKeys = keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] ||
        keys['ArrowRight'] || keys['KeyW'] || keys['KeyS'] ||
        keys['KeyA'] || keys['KeyD'];

      if (usingKeys) {
        if (keys['ArrowUp'] || keys['KeyW']) velocity = Math.min(velocity + ACCEL * dt, MAX_SPEED);
        if (keys['ArrowDown'] || keys['KeyS']) velocity = Math.max(velocity - ACCEL * dt, -MAX_SPEED * 0.5);

        if (keys['ArrowLeft'] || keys['KeyA']) {
          carFacing -= STEER_SPEED * dt * (Math.abs(velocity) / MAX_SPEED + 0.3);
          steerAngle = THREE.MathUtils.lerp(steerAngle, -0.3, 0.1);
        } else if (keys['ArrowRight'] || keys['KeyD']) {
          carFacing += STEER_SPEED * dt * (Math.abs(velocity) / MAX_SPEED + 0.3);
          steerAngle = THREE.MathUtils.lerp(steerAngle, 0.3, 0.1);
        } else {
          steerAngle = THREE.MathUtils.lerp(steerAngle, 0, 0.12);
        }

        velocity *= FRICTION;
        carX += Math.sin(carFacing) * velocity * dt;
        carZ += Math.cos(carFacing) * velocity * dt;

      } else if (mouseActive) {
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.ray.intersectPlane(groundPlane, mouseWorld)) {
          const tx = THREE.MathUtils.clamp(mouseWorld.x, -9, 9);
          const tz = THREE.MathUtils.clamp(mouseWorld.z, -20, 10);
          const dx = tx - carX;
          const dz = tz - carZ;
          const dist = Math.sqrt(dx * dx + dz * dz);

          if (dist > 0.4) {
            const desired = Math.atan2(dx, dz);
            let diff = desired - carFacing;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            carFacing += diff * 0.07;
            steerAngle = THREE.MathUtils.clamp(diff * 0.5, -0.3, 0.3);
            velocity = Math.min(dist * 2.0, MAX_SPEED);
          } else {
            velocity *= 0.75;
            steerAngle = THREE.MathUtils.lerp(steerAngle, 0, 0.1);
          }

          carX += Math.sin(carFacing) * velocity * dt;
          carZ += Math.cos(carFacing) * velocity * dt;
        }
      } else {
        velocity *= FRICTION;
      }

      carX = THREE.MathUtils.clamp(carX, -9, 9);
      carZ = THREE.MathUtils.clamp(carZ, -22, 12);

      car.position.set(carX, 0, carZ);
      car.rotation.y = carFacing;
      car.rotation.z = -steerAngle * 0.07;
      car.updateMatrixWorld();

      wheels.forEach(w => { w.rotation.y += Math.abs(velocity) * dt * 3; });

      const hlL = new THREE.Vector3(-0.75, 0.76, 2.5).applyMatrix4(car.matrixWorld);
      const hlR = new THREE.Vector3(0.75, 0.76, 2.5).applyMatrix4(car.matrixWorld);
      spotL.position.copy(hlL);
      spotR.position.copy(hlR);

      const fwd = new THREE.Vector3(Math.sin(carFacing), -0.06, Math.cos(carFacing)).normalize();
      tgtL.position.copy(hlL).addScaledVector(fwd, 35);
      tgtR.position.copy(hlR).addScaledVector(fwd, 35);

      updateRoadsideArt(hlL, hlR);

      const camIdeal = new THREE.Vector3(carX, 6, carZ + 15);
      camera.position.lerp(camIdeal, 0.05);
      camLookAt.lerp(new THREE.Vector3(carX, 1.2, carZ), 0.07);
      camera.lookAt(camLookAt);

      renderer.render(scene, camera);
    }

    animate();

    function populateRoadsideArt() {
      const zPositions = [-100, -70, -40, -10, 20, 50, 80];
      zPositions.forEach((z, index) => {
        makeRoadsideObject('polka', -10 + random(-2.5, 2.5), z + random(-6, 6));
        makeRoadsideObject('lily', 10 + random(-2.5, 2.5), z + random(-6, 6));
        if (index % 2 === 0) {
          makeRoadsideObject('melting', -13 + random(-2.5, 2.5), z + random(-5, 5));
          makeRoadsideObject('melting', 13 + random(-2.5, 2.5), z + random(-5, 5));
        }
      });
    }

    function makeRoadsideObject(type, x, z) {
      const group = new THREE.Group();
      group.position.set(x, 0, z);
      group.userData.type = type;
      const sizeScale = type === 'lily' ? random(0.8, 2.4) : type === 'polka' ? random(0.9, 2.1) : random(0.85, 2.2);
      const huge = random() < 0.24;
      const scaleBoost = huge ? random(1.6, 2.8) : 1;
      const finalScale = sizeScale * scaleBoost;

      if (type === 'polka') {
        const mat = new THREE.MeshStandardMaterial({
          color: 0x6b9cff,
          emissive: 0x2d5a9d,
          roughness: 0.35,
          metalness: 0.5,
          emissiveIntensity: 0,
        });
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(finalScale * 0.9, 24, 24), mat);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        group.add(sphere);

        const dotMat = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: 0xffffff,
          emissiveIntensity: 0,
          roughness: 1,
          metalness: 0,
        });
        const dotCount = max(3, floor(3 + finalScale));
        for (let i = 0; i < dotCount; i++) {
          const dot = new THREE.Mesh(new THREE.SphereGeometry(0.18 * finalScale, 16, 16), dotMat);
          dot.position.set((random() - 0.5) * finalScale, (random() - 0.2) * finalScale, (random() - 0.5) * finalScale);
          group.add(dot);
        }
      } else if (type === 'lily') {
        const mat = new THREE.MeshStandardMaterial({
          color: 0x9edb8d,
          emissive: 0x24642f,
          roughness: 0.4,
          metalness: 0.3,
          emissiveIntensity: 0,
        });
        const pad = new THREE.Mesh(new THREE.CylinderGeometry(finalScale * 1.2, finalScale * 1.2, 0.12 * finalScale, 32), mat);
        pad.rotation.x = -Math.PI / 2;
        pad.position.y = 0.08 * finalScale;
        pad.castShadow = true;
        pad.receiveShadow = true;
        group.add(pad);

        const leafMat = new THREE.MeshStandardMaterial({
          color: 0x5bb165,
          emissive: 0x204b31,
          roughness: 0.45,
          metalness: 0.2,
          emissiveIntensity: 0,
        });
        for (let i = 0; i < 3; i++) {
          const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.7 * finalScale, 16, 16), leafMat);
          leaf.scale.set(1, 0.14, 1);
          leaf.position.set(Math.cos((Math.PI * 2 * i) / 3) * finalScale * 1.1, 0.12 * finalScale, Math.sin((Math.PI * 2 * i) / 3) * finalScale * 1.1);
          leaf.castShadow = true;
          group.add(leaf);
        }
      } else if (type === 'melting') {
        const mat = new THREE.MeshStandardMaterial({
          color: 0xffcc66,
          emissive: 0x8d6b28,
          roughness: 0.38,
          metalness: 0.25,
          emissiveIntensity: 0,
        });
        const ring = new THREE.Mesh(new THREE.TorusGeometry(finalScale * 0.9, 0.18 * finalScale, 16, 50), mat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.8 * finalScale;
        ring.castShadow = true;
        group.add(ring);

        const faceMat = new THREE.MeshStandardMaterial({
          color: 0xfff6e0,
          emissive: 0xfff6e0,
          emissiveIntensity: 0,
          roughness: 0.55,
          metalness: 0,
        });
        const face = new THREE.Mesh(new THREE.CircleGeometry(finalScale * 0.7, 32), faceMat);
        face.rotation.x = -Math.PI / 2;
        face.position.y = 0.86 * finalScale;
        face.castShadow = true;
        group.add(face);

        const drip = new THREE.Mesh(new THREE.BoxGeometry(0.18 * finalScale, 0.18 * finalScale, 0.5 * finalScale), faceMat);
        drip.position.set(0.55 * finalScale, 0.45 * finalScale, 0);
        drip.rotation.z = 0.35;
        drip.castShadow = true;
        group.add(drip);
      }

      scene.add(group);
      roadsideObjects.push(group);
    }

    function getSpotIntensity(spot, worldPos) {
      const lightDir = new THREE.Vector3().subVectors(spot.target.position, spot.position).normalize();
      const toPoint = new THREE.Vector3().subVectors(worldPos, spot.position);
      const distance = toPoint.length();
      if (distance > spot.distance) return 0;
      const directionToPoint = toPoint.normalize();
      const coneDot = lightDir.dot(directionToPoint);
      if (coneDot < Math.cos(spot.angle)) return 0;
      return Math.max(0, (1 - distance / spot.distance) * coneDot);
    }

    function updateRoadsideArt(hlL, hlR) {
      roadsideObjects.forEach(group => {
        const worldPos = new THREE.Vector3();
        group.getWorldPosition(worldPos);
        const leftIntensity = getSpotIntensity(spotL, worldPos);
        const rightIntensity = getSpotIntensity(spotR, worldPos);
        const spotVisibility = Math.min(1, leftIntensity + rightIntensity);
        const visible = debugRoadsideTimer > 0 || spotVisibility > 0.03;

        group.traverse(child => {
          if (!child.material) return;
          child.visible = visible;
          child.material.emissiveIntensity = debugRoadsideTimer > 0 ? 1.2 : spotVisibility * 2.2;
          child.material.opacity = visible ? 1 : 0;
        });
      });
      debugRoadsideTimer = Math.max(0, debugRoadsideTimer - 0.01);
    }
  </script>
</body>

</html>
