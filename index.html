<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weird Red Hello</title>
  <style>
    :root {
      --red: #ff2d2d;
      --dark: #120000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,45,45,0.25), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(255,90,90,0.2), transparent 30%),
        var(--dark);
      font-family: "Courier New", Courier, monospace;
      color: var(--red);
    }

    .scene {
      position: relative;
      padding: 3rem;
      border: 4px solid var(--red);
      box-shadow: 0 0 30px rgba(255,45,45,0.6);
      transform: rotate(-3deg);
      animation: wobble 2.5s infinite alternate ease-in-out;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,45,45,0.15);
      filter: blur(8px);
      animation: drift 6s infinite alternate ease-in-out;
    }

    .blob.one { width: 130px; height: 130px; top: -20px; left: -20px; }
    .blob.two { width: 90px; height: 90px; bottom: -15px; right: -10px; animation-duration: 5s; }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,45,45,0.7);
      animation: pulse 1.2s infinite alternate;
    }

    .subtitle {
      margin-top: 1rem;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #ffb0b0;
    }

    @keyframes wobble {
      from { transform: rotate(-4deg) scale(0.98); }
      to { transform: rotate(4deg) scale(1.02); }
    }

    @keyframes pulse {
      from { opacity: 0.85; transform: translateY(0); }
      to { opacity: 1; transform: translateY(-4px); }
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(15px,-20px); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <h1>Hello World</h1>
    <div class="subtitle">a very red little nightmare</div>
  </div>
</body>
</html>
