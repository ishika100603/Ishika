<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Scene 1</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #060606;
            color: #f2f2f2;
        }

        body {
            position: relative;
        }

        .topbar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 14px;
            background: rgba(10, 10, 10, 0.72);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .topbar a {
            color: #8ec5ff;
            text-decoration: none;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .topbar a:hover {
            color: #ffffff;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <strong style="font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase;">3D Scene 1</strong>
        <a href="index.html">← Home</a>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="scene1.js"></script>
</body>

</html>
